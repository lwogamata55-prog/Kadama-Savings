<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kadama Saving Group Tracker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#F9FAFB;
--card:#FFFFFF;
--border:#E5E7EB;
--accent:#CA8A04;
--header-yellow:#FFFF00;
--text-main:#111827;
--text-sub:#6B7280;
--danger:#EF4444;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:var(--bg);
font-family:'Inter',sans-serif;
color:var(--text-main);
min-height:100vh;
}

#canvas-bg{
position:fixed;
inset:0;
z-index:-1;
pointer-events:none;
opacity:0.4;
}

header{
padding:15px 30px;
background:var(--card);
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-family:'Playfair Display',serif;
font-size:1.2rem;
font-weight:700;
color:var(--accent);
}

.sync-badge{
font-size:0.65rem;
font-weight:700;
text-transform:uppercase;
display:flex;
align-items:center;
gap:8px;
}

.dot{
width:8px;
height:8px;
background:#D1D5DB;
border-radius:50%;
}

.dot.online{
background:#10B981;
box-shadow:0 0 8px #10B981;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px 30px;
}

.stat-card{
background:var(--card);
padding:20px;
border-radius:8px;
border:1px solid var(--border);
}

.stat-label{
font-size:0.7rem;
color:var(--text-sub);
text-transform:uppercase;
margin-bottom:5px;
}

.stat-value{
font-size:1.5rem;
font-weight:700;
}

.container{
display:grid;
grid-template-columns:1fr 350px;
gap:20px;
padding:0 30px 30px;
}

.ledger-box{
background:var(--card);
border:1px solid var(--border);
border-radius:8px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th{
background:var(--header-yellow);
padding:12px;
font-size:0.75rem;
text-align:left;
border-bottom:2px solid var(--border);
}

td{
padding:12px;
border-bottom:1px solid var(--border);
font-size:0.85rem;
}

.exp-text{
color:var(--danger);
font-weight:600;
}

.sidebar{
display:flex;
flex-direction:column;
gap:15px;
}

.form-panel{
background:var(--card);
padding:20px;
border-radius:8px;
border:1px solid var(--border);
}

h3{
font-size:0.9rem;
margin-bottom:15px;
border-left:4px solid var(--accent);
padding-left:10px;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid var(--border);
border-radius:4px;
}

.btn{
padding:12px;
border:none;
border-radius:4px;
font-weight:600;
cursor:pointer;
width:100%;
margin-bottom:8px;
}

.btn-main{
background:var(--accent);
color:white;
}

.btn-share{
background:#F3F4F6;
border:1px solid #D1D5DB;
}

@media(max-width:950px){
.container{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<canvas id="canvas-bg"></canvas>

<header>

<div class="logo">Kadama Saving Group Kabondo</div>

<div style="display:flex;align-items:center;gap:15px">

<div class="sync-badge">
<div class="dot" id="sync-dot"></div>
<span id="sync-status">Offline Mode</span>
</div>

<button class="btn btn-share" style="width:auto;padding:8px 15px" onclick="copyLink()">Share Link</button>

</div>

</header>

<div class="stats">

<div class="stat-card">
<div class="stat-label">Total Cash (Balance)</div>
<div class="stat-value" id="stat-balance">0</div>
</div>

<div class="stat-card">
<div class="stat-label">Total Savings</div>
<div class="stat-value" id="stat-savings">0</div>
</div>

<div class="stat-card">
<div class="stat-label">Expenditure</div>
<div class="stat-value" style="color:var(--danger)" id="stat-exp">0</div>
</div>

</div>

<div class="container">

<div class="ledger-box">

<table>

<thead>
<tr>
<th>Date</th>
<th>Member</th>
<th>Savings</th>
<th>Welfare</th>
<th>Total Cash</th>
<th>Expenditure</th>
</tr>
</thead>

<tbody id="ledger-body"></tbody>

</table>

</div>

<div class="sidebar">

<div class="form-panel">

<h3>Record Transaction</h3>

<input type="text" id="member-name" placeholder="Member Name">

<input type="date" id="in-date">

<input type="number" id="in-savings" placeholder="Savings Amount">

<input type="number" id="in-welfare" placeholder="Welfare Amount">

<input type="number" id="in-exp" placeholder="Expenditure (Optional)">

<button class="btn btn-main" onclick="addEntry()">Update Sheet</button>

<button class="btn btn-share" onclick="shareMember()">Copy Member Link</button>

<button class="btn btn-share" onclick="enableCloud()">Go Live / Sync</button>

</div>

</div>

</div>

<script>

let state={entries:[]}

let binId=window.location.hash.substring(1)

const API_URL="https://keyvalue.immanual.workers.dev/api/keyval"



function initBg(){

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000)

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("canvas-bg"),alpha:true})

renderer.setSize(window.innerWidth,window.innerHeight)

const geometry=new THREE.SphereGeometry(15,32,32)

const material=new THREE.MeshBasicMaterial({color:0xCA8A04,wireframe:true,transparent:true,opacity:0.1})

const sphere=new THREE.Mesh(geometry,material)

scene.add(sphere)

camera.position.z=25

function animate(){

requestAnimationFrame(animate)

sphere.rotation.y+=0.003

renderer.render(scene,camera)

}

animate()

}



function render(){

const body=document.getElementById("ledger-body")

body.innerHTML=""

let runningTotal=0

let totalSavings=0

let totalExp=0



state.entries.sort((a,b)=>new Date(a.date)-new Date(b.date))



state.entries.forEach(e=>{

const savings=Number(e.savings||0)

const welfare=Number(e.welfare||0)

const exp=Number(e.exp||0)



totalSavings+=savings

totalExp+=exp



runningTotal=(runningTotal+savings+welfare)-exp



body.innerHTML+=`

<tr>

<td>${e.date}</td>

<td>${e.member}</td>

<td>${savings.toLocaleString()}</td>

<td>${welfare.toLocaleString()}</td>

<td style="font-weight:700">${runningTotal.toLocaleString()}</td>

<td class="exp-text">${exp>0?exp.toLocaleString():"-"}</td>

</tr>

`

})



document.getElementById("stat-balance").innerText=runningTotal.toLocaleString()

document.getElementById("stat-savings").innerText=totalSavings.toLocaleString()

document.getElementById("stat-exp").innerText=totalExp.toLocaleString()

}



function addEntry(){

const member=document.getElementById("member-name").value

const date=document.getElementById("in-date").value

const savings=document.getElementById("in-savings").value

const welfare=document.getElementById("in-welfare").value||0

const exp=document.getElementById("in-exp").value||0



if(!member||!date||!savings){

alert("Member, Date and Savings required")

return

}



state.entries.push({member,date,savings,welfare,exp})



render()

save()



document.getElementById("in-savings").value=""

document.getElementById("in-welfare").value=""

document.getElementById("in-exp").value=""

}



async function save(){

if(!binId){

localStorage.setItem("kadama_data",JSON.stringify(state))

return

}



document.getElementById("sync-status").innerText="Syncing..."



try{

await fetch(`${API_URL}/${binId}`,{method:"POST",body:JSON.stringify(state)})

document.getElementById("sync-status").innerText="Live"

document.getElementById("sync-dot").classList.add("online")

}catch(e){

console.log(e)

}

}



async function enableCloud(){

if(!binId){

binId="kadama_"+Math.random().toString(36).substr(2,9)

window.location.hash=binId

}



await save()

copyLink()

alert("Tracker is now LIVE. Link copied.")

}



async function load(){

if(binId){

try{

const res=await fetch(`${API_URL}/${binId}`)

const data=await res.json()

if(data) state=data



document.getElementById("sync-dot").classList.add("online")

document.getElementById("sync-status").innerText="Live"

}catch(e){}

}

else{

const local=localStorage.getItem("kadama_data")

if(local) state=JSON.parse(local)

}



render()

}



function copyLink(){

if(!binId){

alert("Click Go Live first")

return

}



navigator.clipboard.writeText(window.location.href)

alert("Group link copied")

}



function shareMember(){

const member=document.getElementById("member-name").value



if(!member){

alert("Enter member name first")

return

}



const link=window.location.origin+window.location.pathname+"#"+binId+"?member="+encodeURIComponent(member)



navigator.clipboard.writeText(link)



alert("Member link copied for "+member)

}



setInterval(load,5000)



window.onload=()=>{

initBg()

load()

}

</script>

</body>
</html>
